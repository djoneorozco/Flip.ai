<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <script src="main.js" defer></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a192f;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    input, textarea {
      margin: 0.5rem;
      padding: 0.75rem;
      width: 300px;
      border-radius: 6px;
      border: none;
    }
    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #0ea5e9;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }
    #glassBox {
      display: none;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 12px;
      margin-top: 2rem;
      color: #000;
    }
    #enhancedImage {
      display: none;
      max-width: 500px;
      margin-top: 1rem;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-Driven Flip Insights</p>

  <input id="zip" placeholder="ZIP Code (optional)">
  <input id="price" type="number" placeholder="Property Purchase Cost">
  <input id="investment" type="number" placeholder="Planned Investment Cost">
  <textarea id="prompt" placeholder="Details (optional)"></textarea>

  <input type="file" id="propertyImage" accept="image/*">
  <br/>
  <button id="btn-enhance">Enhance Image & See ARV</button>

  <div id="glassBox">
    <h2 id="arvValue">Expected ARV:</h2>
    <img id="enhancedImage" alt="Enhanced Result">
  </div>
</body>
</html>
