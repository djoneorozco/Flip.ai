<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0a192f;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    input, textarea, button {
      margin: 0.5rem;
      padding: 0.75rem;
      border-radius: 5px;
      border: none;
    }

    #workingImage {
      display: none;
      width: 120px;
    }

    .glass-box {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 2rem;
    }

    #enhancedImage {
      display: none;
      width: 100%;
      max-width: 400px;
      margin-top: 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>

  <!-- INPUTS -->
  <input id="zip" type="text" placeholder="ZIP Code (optional)" />
  <input id="price" type="number" placeholder="Property Purchase Cost" />
  <input id="investment" type="number" placeholder="Planned Investment Cost" />
  <textarea id="prompt" placeholder="Details (optional)"></textarea>

  <!-- BUTTON -->
  <button id="btn-enhance">Enhance Image & See ARV</button>

  <!-- Working Spinner -->
  <div>
    <img id="workingImage" src="./static/images/working.png" alt="Working..." />
  </div>

  <!-- Results -->
  <div class="glass-box" id="glassBox">
    <h2>Expected ARV</h2>
    <canvas id="arvChart"></canvas>
    <img id="enhancedImage" src="" alt="Enhanced Result" />
  </div>

  <script src="./static/js/main.js"></script>
</body>
</html>
