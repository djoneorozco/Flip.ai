<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip.ai Test Upload</title>
</head>
<body>
  <h1>✅ Flip.ai Test Upload</h1>

  <label>Select Base Image:</label><br>
  <input type="file" id="imageFileInput" /><br><br>

  <label>Select Mask Image:</label><br>
  <input type="file" id="maskFileInput" /><br><br>

  <button id="uploadBtn">Enhance Image</button>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const imageFile = document.getElementById('imageFileInput').files[0];
      const maskFile = document.getElementById('maskFileInput').files[0];

      if (!imageFile || !maskFile) {
        alert("⚠️ You must select BOTH an image and a mask!");
        return;
      }

      const formData = new FormData();
      formData.append('image', imageFile);
      formData.append('mask', maskFile);

      try {
        const response = await fetch('https://flip-ai.onrender.com/api/enhance', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Server responded with ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        console.log("✅ Enhanced image URL:", data.enhancedImageUrl);

        // Show result
        document.getElementById('result').innerHTML = `
          <p><strong>Enhanced Image URL:</strong> <a href="${data.enhancedImageUrl}" target="_blank">${data.enhancedImageUrl}</a></p>
          <img src="${data.enhancedImageUrl}" alt="Enhanced" style="max-width:500px;">
        `;

      } catch (error) {
        console.error("❌ Enhance error:", error);
        alert(`Enhance failed: ${error.message}`);
      }
    });
  </script>
</body>
</html>
