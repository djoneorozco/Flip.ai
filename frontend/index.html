<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>✅ Flip.ai — Real Estate Smart Enhancer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    input, button {
      display: block;
      margin: 10px 0;
    }
    img {
      max-width: 100%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>✅ Flip.ai — Smart Budget + Photo Enhancer</h1>

  <label for="propertyImage">Select Property Image:</label>
  <input type="file" id="propertyImage" accept="image/*" />

  <label for="purchasePrice">Purchase Price ($):</label>
  <input type="number" id="purchasePrice" placeholder="e.g. 150000" />

  <label for="rehabInvestment">Planned Rehab Investment ($):</label>
  <input type="number" id="rehabInvestment" placeholder="e.g. 30000" />

  <button id="generateReport">Generate Flip Report</button>

  <hr />

  <div id="result"></div>
  <div id="graph"></div>

  <!-- ✅ Always load your script at the end -->
  <script src="main.js"></script>

</body>
</html>
