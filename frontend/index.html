<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip.ai — Smart Flip Advisor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      background: #0a192f;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 2rem;
    }
    h1 { font-size: 2rem; }
    input, button {
      display: block;
      margin: 0.5rem 0;
      padding: 0.5rem;
    }
    #result { margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Welcome to Flip.ai</h1>

  <input type="number" id="purchasePrice" placeholder="Property Purchase Cost" />
  <input type="number" id="rehabInvestment" placeholder="Planned Rehab Investment" />
  <input type="file" id="propertyImage" accept="image/*" />

  <button id="generateReport">Generate Smart Report & Enhance Image</button>

  <div id="result"></div>
  <div id="graph"></div>

  <script src="main.js"></script>
</body>
</html>
