<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-Driven Flip Insights</p>

  <!-- ✅ INPUT FIELDS -->
  <input id="zip" type="text" placeholder="ZIP Code (optional)" />
  <input id="propertyValue" type="number" placeholder="Property Purchase Cost" />
  <input id="investmentAmount" type="number" placeholder="Planned Investment Cost" />
  <textarea id="details" placeholder="Details (optional)"></textarea>

  <!-- ✅ FILE UPLOAD -->
  <input type="file" id="propertyImage" accept="image/*" />

  <!-- ✅ BUTTON (has correct ID!) -->
  <button id="enhanceBtn">Enhance Image & See ARV</button>

  <!-- ✅ SCRIPTS -->
  <script src="main.js"></script>
</body>
</html>
