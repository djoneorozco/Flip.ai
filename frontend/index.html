<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      background: #0a192f;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin-bottom: 2rem;
    }

    input, textarea {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0.5rem 0;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    .glass-box {
      display: none;
      position: relative;
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      text-align: center;
    }

    .glass-box.show {
      display: block;
    }

    #enhancedImage {
      display: none;
      margin-top: 1rem;
      max-width: 500px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <!-- #1 Header -->
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>

  <!-- #2 Input Fields -->
  <input id="zip" type="text" placeholder="ZIP Code (optional)" />
  <input id="price" type="number" placeholder="Property Purchase Cost" />
  <input id="investment" type="number" placeholder="Planned Investment Cost" />
  <textarea id="prompt" placeholder="Details (optional)"></textarea>

  <!-- #3 Upload -->
  <input type="file" id="propertyImage" accept="image/*" />

  <!-- #4 Action Button -->
  <button id="btn-enhance">Enhance Image & See ARV</button>

  <!-- #5 Glass Box for ARV & Chart -->
  <div class="glass-box" id="glassBox">
    <h2 id="arvTitle">Expected ARV</h2>
    <canvas id="arvChart"></canvas>
  </div>

  <!-- #6 Enhanced Image Output -->
  <img id="enhancedImage" src="" alt="Enhanced Result" />

  <!-- #7 Scripts -->
  <script src="main.js"></script>
</body>
</html>
