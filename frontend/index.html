<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a192f;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin-bottom: 2rem;
    }

    input, textarea {
      width: 100%;
      max-width: 300px;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      margin: 0 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      background: #0ea5e9;
      color: #fff;
    }

    .glass-box {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      z-index: 999;
      max-width: 600px;
    }

    .glass-box.show {
      display: block;
    }

    .glass-box #schoolList ul {
      list-style: none;
      padding: 0;
    }

    #enhancedImage {
      display: none;
      width: 100%;
      max-width: 500px;
      margin-top: 1rem;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <!-- //#1 HERO SECTION -->
  <h1>Welcome to Flip.ai</h1>
  <p>#2 Smart AI-driven Flip Insights</p>

  <!-- //#2 FORM -->
  <input id="zip" type="text" placeholder="ZIP Code (e.g. 78046)" />
  <input id="price" type="number" placeholder="Your Price (e.g. 250000)" />
  <textarea id="prompt" placeholder="Details (e.g. Notes for AI)"></textarea>
  <div>
    <button id="btn-test">Test Backend</button>
    <button id="btn-ask">Ask FlipAI</button>
  </div>

  <!-- //#3 IMAGE UPLOADER -->
  <h3 style="margin-top:2rem;">Enhance Your Property Photo</h3>
  <label for="propertyImage">Upload Property Image</label>
  <input type="file" id="propertyImage" accept="image/*" />
  <button id="btn-enhance">Enhance Image with AI</button>
  <img id="enhancedImage" src="" alt="Enhanced Result" />

  <!-- //#4 RESULTS GLASS BOX -->
  <div class="glass-box" id="glassBox">
    <div id="result"></div>
    <div id="chartContainer" style="display:none;">
      <canvas id="priceChart"></canvas>
    </div>
    <div id="schoolList"></div>
    <div id="crimeInfo"></div>
  </div>

  <!-- //#5 SCRIPTS -->
  <script src="main.js"></script>
</body>
</html>
