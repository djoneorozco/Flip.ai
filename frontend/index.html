<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <style>
    body {
      background: #0a192f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    p {
      margin-bottom: 2rem;
    }
    input, textarea {
      width: 100%;
      max-width: 300px;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 6px;
      background: #0ea5e9;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>
  <input id="zip" type="text" placeholder="ZIP Code (optional)" />
  <input id="price" type="number" placeholder="Property Purchase Cost" />
  <input id="investment" type="number" placeholder="Planned Investment Cost" />
  <textarea id="prompt" placeholder="Details (optional)"></textarea>
  <input type="file" id="propertyImage" accept="image/*" />
  <button id="btn-enhance">Enhance Image & See ARV</button>
  <script src="main.js"></script>
</body>
</html>
