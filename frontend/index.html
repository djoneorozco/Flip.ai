<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0a192f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }

    h1 { font-size: 2rem; }
    p { margin-bottom: 1rem; }

    input, textarea {
      display: block;
      margin: 0.5rem auto;
      padding: 0.75rem;
      width: 90%;
      max-width: 300px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #0ea5e9;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }

    #resultImage {
      display: block;
      margin: 2rem auto;
      max-width: 500px;
      border-radius: 8px;
    }

    #glassBox {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 2rem;
      margin-top: 2rem;
      color: #000;
    }

    #glassBox.show {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>

  <!-- Inputs -->
  <input id="zip" type="text" placeholder="ZIP Code (optional)" />
  <input id="price" type="number" placeholder="Property Purchase Cost" />
  <input id="investment" type="number" placeholder="Planned Investment Cost" />
  <textarea id="prompt" placeholder="Details (optional)"></textarea>

  <!-- Image Upload -->
  <input id="propertyImage" type="file" accept="image/*" />

  <button id="btn-enhance">Enhance Image & See ARV</button>

  <!-- Output -->
  <div id="glassBox">
    <h2>Expected ARV</h2>
    <canvas id="arvChart"></canvas>
    <img id="resultImage" src="" alt="Enhanced Result" />
  </div>

  <script src="main.js"></script>
</body>
</html>
