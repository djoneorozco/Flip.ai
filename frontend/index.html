<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Option A</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0a192f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    input, textarea {
      display: block;
      margin: 0.5rem auto;
      padding: 0.75rem;
      max-width: 300px;
      width: 100%;
    }
    button {
      margin: 0.5rem;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 6px;
    }
    #glassBox {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: #000;
      border-radius: 12px;
      padding: 1rem;
      margin-top: 2rem;
    }
    #enhancedImage {
      width: 100%;
      max-width: 500px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>Flip.ai</h1>
  <p>Smart 70% Rule & AI Enhancement</p>

  <input id="price" type="number" placeholder="Property Value"/>
  <input id="investment" type="number" placeholder="Planned Investment"/>
  <button id="btn-ask">Get Flip Plan</button>

  <input type="file" id="propertyImage" accept="image/*"/>
  <button id="btn-enhance">Enhance Image</button>

  <div id="glassBox">
    <h2>Flip Plan & ARV</h2>
    <div id="plan"></div>
    <canvas id="arvChart"></canvas>
    <img id="enhancedImage" alt="Enhanced Result"/>
  </div>

  <script src="main.js"></script>
</body>
</html>
