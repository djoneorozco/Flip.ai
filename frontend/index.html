<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      background: #0a192f;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    p {
      margin-bottom: 2rem;
      opacity: 0.8;
    }

    .form-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    input, textarea, button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      background: #0ea5e9;
      color: #fff;
      cursor: pointer;
    }

    .glass-box {
      display: none;
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
    }

    #workingImage {
      display: none;
      width: 120px;
      margin-top: 1rem;
    }

    #enhancedImage {
      display: none;
      width: 100%;
      max-width: 400px;
      margin-top: 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>

  <!-- FORM CONTAINER -->
  <div class="form-container">
    <input id="zip" type="text" placeholder="ZIP Code (optional)" />
    <input id="price" type="number" placeholder="Property Purchase Cost" />
    <input id="investment" type="number" placeholder="Planned Investment Cost" />
    <textarea id="prompt" placeholder="Details (optional)"></textarea>

    <!-- ✅ Image Upload Input (FIXED) -->
    <input type="file" id="propertyImage" accept="image/*" />

    <button id="btn-enhance">Enhance Image & See ARV</button>
  </div>

  <!-- WORKING STATE -->
  <img id="workingImage" src="./static/images/working.png" alt="Working...">

  <!-- GLASS BOX RESULTS -->
  <div class="glass-box" id="glassBox">
    <h2>Expected ARV</h2>
    <canvas id="arvChart"></canvas>
    <img id="enhancedImage" src="" alt="Enhanced Result" />
  </div>

  <script src="./static/js/main.js"></script>
</body>
</html>
