<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a192f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; }
    p { margin-bottom: 1rem; }
    input, textarea {
      margin: 0.5rem;
      padding: 0.75rem;
      border-radius: 4px;
      border: none;
      width: 250px;
    }
    button {
      background: #0ea5e9;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
    }
    #resultImage {
      margin-top: 2rem;
      max-width: 500px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-Driven Flip Insights</p>

  <input id="zip" type="text" placeholder="ZIP Code (optional)">
  <input id="price" type="number" placeholder="Property Purchase Cost">
  <input id="investment" type="number" placeholder="Planned Investment Cost">
  <textarea id="details" placeholder="Details (optional)"></textarea>
  <input id="propertyImage" type="file" accept="image/*">

  <button id="enhanceBtn">Enhance Image & See ARV</button>

  <img id="resultImage" src="" alt="Enhanced" style="display: none;">

  <script src="main.js"></script>
</body>
</html>
