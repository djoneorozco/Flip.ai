<!DOCTYPE html>
<html lang="en">
<head>
  <!-- //#1 META + TITLE + CHART.JS -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart Realtor Enhancer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- //#2 BASIC STYLES -->
  <style>
    body {
      background: #0a192f;
      color: #fff;
      text-align: center;
      font-family: Arial, sans-serif;
    }
    input, button {
      margin: 8px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #0ea5e9;
      color: #fff;
      cursor: pointer;
    }

    .glass-box {
      display: none;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      color: #000;
    }

    .glass-box.show {
      display: block;
    }

    #enhancedImage {
      display: none;
      max-width: 400px;
      margin-top: 20px;
      border-radius: 8px;
    }

    #workingOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
    }

    #workingOverlay img {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
    }
  </style>
</head>

<body>
  <!-- //#3 HEADER -->
  <h1>Flip.ai</h1>
  <p>#1 Smart AI-Driven Realtor Enhancer</p>

  <!-- //#4 USER INPUTS -->
  <input id="investment" type="number" placeholder="Planned Investment Cost"/>
  <br/>
  <input type="file" id="propertyImage" accept="image/*"/>
  <br/>
  <button id="btn-enhance">Enhance Image</button>

  <!-- //#5 OUTPUT GLASS BOX -->
  <div id="glassBox" class="glass-box">
    <h2>Expected ARV</h2>
    <canvas id="arvChart"></canvas>
    <img id="enhancedImage" alt="Enhanced Property"/>
  </div>

  <!-- //#6 WORKING OVERLAY -->
  <div id="workingOverlay">
    <img src="frontend/static/images/working.png" alt="Working...">
  </div>

  <!-- //#7 MAIN JS -->
  <script src="main.js"></script>
</body>
</html>
