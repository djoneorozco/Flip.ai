<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <style>
    body {
      background: #0a192f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; }
    p { margin: 0.5rem 0 2rem; }
    input, textarea {
      display: block;
      margin: 0.5rem 0;
      padding: 0.5rem;
      width: 250px;
      border-radius: 4px;
      border: none;
    }
    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #0ea5e9;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>

  <input id="zip" type="text" placeholder="ZIP Code (optional)" />
  <input id="price" type="number" placeholder="Property Purchase Cost" />
  <input id="investment" type="number" placeholder="Planned Investment Cost" />
  <textarea id="prompt" placeholder="Details (optional)"></textarea>
  <input type="file" id="propertyImage" accept="image/*" />

  <button id="btn-enhance">Enhance Image & See ARV</button>

  <script src="main.js"></script>
</body>
</html>
