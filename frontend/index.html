<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip.ai – Smart AI-Driven Flip Insights</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a192f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      margin-bottom: 0.2rem;
    }
    p {
      margin: 0.2rem 0 2rem 0;
    }
    input, textarea {
      display: block;
      width: 300px;
      margin-bottom: 1rem;
      padding: 0.7rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      background: #0ea5e9;
      color: #fff;
    }
    .result {
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      text-align: center;
    }
    .result img {
      width: 100%;
      border-radius: 8px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <!-- #1 HEADER -->
  <h1>Welcome to Flip.ai</h1>
  <p>#1 Smart AI-driven Flip Insights</p>

  <!-- #2 INPUTS -->
  <input id="propertyValue" type="number" placeholder="Property Purchase Cost" />
  <input id="investment" type="number" placeholder="Planned Investment Cost" />
  <input type="file" id="propertyImage" accept="image/*" />

  <!-- #3 BUTTON -->
  <button id="btn-enhance">Enhance & Get ARV</button>

  <!-- #4 RESULTS -->
  <div id="result" class="result" style="display:none;">
    <h2>✅ Smart Flip Report</h2>
    <p id="arv"></p>
    <p id="maxOffer"></p>
    <p id="tier"></p>
    <img id="enhancedImage" src="" alt="Enhanced Property" />
  </div>

  <script src="main.js"></script>
</body>
</html>
