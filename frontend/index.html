<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip.ai — Full Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    img { max-width: 400px; border: 1px solid #ccc; margin: 10px 0; }
    input { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>✅ Flip.ai — One Image Upload + Smart Budget</h1>

  <!-- Upload Image -->
  <label for="imageFileInput">Select Property Image:</label><br>
  <input type="file" id="imageFileInput" accept="image/*" /><br><br>

  <!-- Budget Inputs -->
  <label for="purchasePrice">Purchase Price ($):</label><br>
  <input type="number" id="purchasePrice" /><br><br>

  <label for="investmentAmount">Planned Rehab Investment ($):</label><br>
  <input type="number" id="investmentAmount" /><br><br>

  <button id="processBtn">Generate Flip Report</button>

  <h2>📊 Result:</h2>
  <div id="result"></div>

  <h2>📈 Graph:</h2>
  <canvas id="flipChart" width="600" height="300"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="main.js"></script>
</body>
</html>
